services:
  postgres:
    image: postgres:16-alpine
    container_name: gym_crm_postgres
    environment:
      POSTGRES_DB: gym_crm
      POSTGRES_USER: gym_user
      POSTGRES_PASSWORD: gym_pass
    ports:
      - "5432:5432"
    volumes:
      - gym_crm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gym_user -d gym_crm"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  gym_crm_pgdata: