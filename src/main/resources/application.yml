spring:
  application:
    name: gym-crm-system
  datasource:
    url: jdbc:postgresql://localhost:5432/gym_crm
    username: gym_user
    password: gym_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  web:
    locale: en
    locale-resolver: fixed

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    # Without this the UI ships with petstore.swagger.io hard-coded as its spec URL
    disable-swagger-default-url: true

server:
  port: 8080
